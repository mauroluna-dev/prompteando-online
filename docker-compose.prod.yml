# Production compose — no reverse proxy bundled (bring your own).
#
# The app is NOT published to the host: it only listens on the internal
# `prompteando` Docker network on port 3010. Put your own reverse proxy
# (nginx / Caddy / etc.) in front and forward to `app:3010` — either by
# adding it as a service here on the same network, or by attaching an
# existing proxy container to the network:
#     docker network connect prompteando <your-proxy-container>
#
# The app/migrate services run a PREBUILT image pulled from a registry
# (GitHub Container Registry by default) — prod does NOT build from
# source. The image is published by .github/workflows/release.yml. Pin
# a specific version with APP_IMAGE in .env (recommended over
# the floating `:latest`):
#     APP_IMAGE=ghcr.io/mauroluna-dev/prompteando-online:v1.2.3
#
# The image is private (private repo), so the host must authenticate to
# GHCR once before pulling — with a token that has `read:packages`:
#     echo $GHCR_TOKEN | docker login ghcr.io -u <github-user> --password-stdin
#
# Required in .env: POSTGRES_PASSWORD (the DB credential). POSTGRES_USER
# and POSTGRES_DB default to `prompteando` if unset. See .env.example.
#
# Deploy (interpolation + container env both come from .env):
#     docker compose --env-file .env -f docker-compose.prod.yml pull
#     docker compose --env-file .env -f docker-compose.prod.yml up -d
#
# Postgres and Redis are internal-only (never published to the host).

name: prompteando

networks:
  prompteando:
    name: prompteando

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prompteando}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-prompteando}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prompteando
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - prompteando
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ${APP_IMAGE:-ghcr.io/mauroluna-dev/prompteando-online:latest}
    restart: "no"
    command: ["bun", "run", "db:migrate"]
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-prompteando}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-prompteando}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prompteando

  app:
    image: ${APP_IMAGE:-ghcr.io/mauroluna-dev/prompteando-online:latest}
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-prompteando}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-prompteando}
      REDIS_URL: redis://redis:6379
    expose:
      - "3010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - prompteando
    healthcheck:
      test:
        - CMD
        - bun
        - --eval
        - "fetch('http://localhost:3010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
