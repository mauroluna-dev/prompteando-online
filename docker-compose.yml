name: prompteando

networks:
  prompteando:
    name: prompteando

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prompteando
      POSTGRES_PASSWORD: prompteando
      POSTGRES_DB: prompteando
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prompteando
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompteando"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - prompteando
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    profiles: [full]
    build:
      context: .
      target: prod
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: prompteando
      POSTGRES_PASSWORD: prompteando
      POSTGRES_DB: prompteando
      REDIS_URL: redis://redis:6379
    ports:
      - "3010:3010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prompteando
    healthcheck:
      test:
        - CMD
        - bun
        - --eval
        - "fetch('http://localhost:3010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 10
